# ─── Build settings ──────────────────────────────────────────
[build]
  command = "npm run build"
  publish = "dist"

# ─── Video files: no cache limit, correct MIME type ──────────
[[headers]]
  for = "/*.mp4"
  [headers.values]
    Content-Type  = "video/mp4"
    Cache-Control = "public, max-age=31536000, immutable"
    Accept-Ranges = "bytes"

[[headers]]
  for = "/*.webm"
  [headers.values]
    Content-Type  = "video/webm"
    Cache-Control = "public, max-age=31536000, immutable"
    Accept-Ranges = "bytes"

# ─── JS/CSS assets ───────────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── HTML: no cache (always fresh) ───────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ─── Manifest: fix 503 from stale Service Worker ─────────────
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ─── SPA routing: all routes → index.html ────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
